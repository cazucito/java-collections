site_name: Java Collections Examples
site_description: Ejemplos del API Java Collections con enfoque BDD/TDD
site_author: cazucito
site_url: https://cazucito.github.io/java-collections/
strict: false

repo_name: cazucito/java-collections
repo_url: https://github.com/cazucito/java-collections
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 cazucito - Apache 2.0 License

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang: 
        - es
        - en

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - attr_list
  - md_in_html
  - def_list

extra_css:
  - stylesheets/extra.css

nav:
  - Inicio: index.md
  - Empezar:
    - introduccion/index.md
    - introduccion/instalacion.md
    - introduccion/primeros-pasos.md
  - Colecciones:
    - colecciones/index.md
    - List:
      - colecciones/list/arraylist.md
      - colecciones/list/linkedlist.md
      - colecciones/list/cuando-usar.md
    - Set:
      - colecciones/set/hashset.md
      - colecciones/set/treeset.md
      - colecciones/set/linkedhashset.md
    - Map:
      - colecciones/map/hashmap.md
      - colecciones/map/treemap.md
      - colecciones/map/linkedhashmap.md
    - Queue:
      - colecciones/queue/priorityqueue.md
      - colecciones/queue/arraydeque.md
  - Casos de Uso:
    - casos-de-uso/index.md
  - Avanzado:
    - avanzado/index.md
    - avanzado/streams.md
    - avanzado/generics.md
    - avanzado/concurrencia.md
    - avanzado/algoritmos.md
  - Anti-Patrones:
    - anti-patrones/index.md
    - anti-patrones/memory-leaks.md
    - anti-patrones/concurrent-modification.md
    - anti-patrones/equals-vs-reference.md
  - Rendimiento:
    - rendimiento/index.md
    - rendimiento/complejidad.md
    - rendimiento/benchmarks.md
  - Referencia:
    - referencia/escenarios-bdd.md
    - referencia/diagramas.md
    - referencia/faq.md
  - Contribución:
    - contribucion/index.md
    - contribucion/arquitectura.md
    - contribucion/estandares.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cazucito
