site_name: Java Collections Examples
site_description: Ejemplos del API Java Collections con enfoque BDD/TDD
site_author: cazucito
site_url: https://cazucito.github.io/java-collections

repo_name: cazucito/java-collections
repo_url: https://github.com/cazucito/java-collections
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 cazucito - Apache 2.0 License

theme:
  name: material
  language: es
  logo: material/library
  favicon: material/library
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.tooltips

plugins:
  - search:
      lang: 
        - es
        - en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - minify:
      minify_html: true
  - privacy:
      assets: true
      assets_exclude: 
        - cdn.jsdelivr.net
        - fonts.googleapis.com
        - fonts.gstatic.com

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - tables
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - material

nav:
  - Inicio: index.md
  - Empezar:
    - introduccion/index.md
    - introduccion/instalacion.md
    - introduccion/primeros-pasos.md
  - Colecciones:
    - colecciones/index.md
    - List:
      - colecciones/list/arraylist.md
      - colecciones/list/linkedlist.md
      - colecciones/list/cuando-usar.md
    - Set:
      - colecciones/set/hashset.md
      - colecciones/set/treeset.md
      - colecciones/set/linkedhashset.md
    - Map:
      - colecciones/map/hashmap.md
      - colecciones/map/treemap.md
      - colecciones/map/linkedhashmap.md
    - Queue:
      - colecciones/queue/priorityqueue.md
      - colecciones/queue/arraydeque.md
  - Casos de Uso:
    - casos-de-uso/index.md
  - Avanzado:
    - avanzado/index.md
    - avanzado/streams.md
    - avanzado/generics.md
    - avanzado/concurrencia.md
    - avanzado/algoritmos.md
  - Anti-Patrones:
    - anti-patrones/index.md
    - anti-patrones/memory-leaks.md
    - anti-patrones/concurrent-modification.md
    - anti-patrones/equals-vs-reference.md
  - Rendimiento:
    - rendimiento/index.md
    - rendimiento/complejidad.md
    - rendimiento/benchmarks.md
  - Referencia:
    - referencia/escenarios-bdd.md
    - referencia/diagramas.md
    - referencia/faq.md
  - Contribución:
    - contribucion/index.md
    - contribucion/arquitectura.md
    - contribucion/estandares.md

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cazucito
  version:
    provider: mike
